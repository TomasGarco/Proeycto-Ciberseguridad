# Zona de rate limiting a nivel http (nginx no permite limit_req_zone dentro
# de un bloque server) — se carga junto con nginx.conf vía
# "include /etc/nginx/conf.d/*.conf;" en el nginx.conf base de la imagen.
#
# 1r/s con burst 20: hasta 20 requests de ráfaga (útil para que el dashboard
# cargue varias pestañas/gráficos de golpe sin que nginx los rechace), y
# a partir de ahí, máximo 1 request por segundo por IP. Aplica a todo /api/*
# (ver "limit_req zone=api_zone" en nginx.conf) — login y registro además
# tienen su propio límite más estricto en auth-service (por username/IP).
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=1r/s;
