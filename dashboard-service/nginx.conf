server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck del contenedor nginx (no depende de los servicios backend)
    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Reverse proxy hacia los microservicios: el navegador solo habla con
    # este origen (:3000), así no hay problemas de CORS.
    location /api/auth/ {
        proxy_pass http://auth-service:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/logs {
        proxy_pass http://log-service:8010/logs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analysis/ {
        proxy_pass http://analysis-service:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Tubería lista para el Alert Service (placeholder, sin lógica de negocio
    # todavía — ver alert-service/). El AlertsPage.jsx del dashboard sigue
    # siendo estático hasta la Semana 8+.
    location /api/alerts/ {
        proxy_pass http://alert-service:8003/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
