# Puerto 3000: solo redirige a HTTPS. El healthcheck de Docker (/health)
# se responde aquí mismo, sin redirigir, para no depender del certificado.
server {
    listen 3000;
    server_name _;

    location /health {
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host:443$request_uri;
    }
}

# Puerto 3443 (mapeado a 443 del host): SPA + reverse proxy, todo sobre TLS.
# Certificado autofirmado de desarrollo — ver certs/generate-dev-cert.sh.
server {
    listen 3443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/dev.crt;
    ssl_certificate_key  /etc/nginx/certs/dev.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # nginx devuelve 503 por defecto cuando limit_req rechaza un request —
    # confuso porque 503 normalmente significa "servicio caído". 429 es el
    # código HTTP correcto para "demasiadas peticiones".
    limit_req_status 429;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida sirve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy hacia los microservicios: el navegador solo habla con
    # este origen (https://localhost), así no hay problemas de CORS. El
    # tramo nginx -> microservicio sigue en HTTP plano dentro de la red
    # interna de Docker, no expuesta al host.
    #
    # Rate limiting (Semana 10): zona "api_zone" definida en ratelimit.conf,
    # 1 request/segundo por IP con ráfaga de 20 — cubre floods generales a
    # cualquier endpoint /api/*, más allá del límite específico de login y
    # registro que ya tiene auth-service. burst=20 nodelay: permite hasta 20
    # requests de golpe (el dashboard pide varios endpoints al cargar) sin
    # cortar de entrada, y a partir de ahí limita a 1r/s.
    location /api/auth/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://auth-service:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/logs {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://log-service:8010/logs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/analysis/ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://analysis-service:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # El backend ya expone /api/items (Auth Service) — path idéntico, sin
    # reescritura, a diferencia de /api/auth (que sí quita el prefijo /api).
    location /api/items {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://auth-service:8000/api/items;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Mismo patrón que /api/logs: /api/alerts → /alerts, /api/alerts/stats →
    # /alerts/stats, PATCH /api/alerts/<id> → /alerts/<id>.
    location /api/alerts {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass http://alert-service:8003/alerts;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
